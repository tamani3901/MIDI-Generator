<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC → MIDI（確実読み込み版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #475569;
            margin-bottom: 1.8rem;
            font-size: 1rem;
        }
        #statusBox {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }
        #statusBox.loading {
            background: #fef9c3;
            border-color: #facc15;
            color: #713f12;
        }
        #statusBox.ready {
            background: #dcfce7;
            border-color: #4ade80;
            color: #14532d;
        }
        #statusBox.error {
            background: #fee2e2;
            border-color: #f87171;
            color: #7f1d1d;
        }
        #statusBox.warning {
            background: #ffedd5;
            border-color: #fb923c;
            color: #7c2d12;
        }
        #statusIcon {
            font-size: 1.4rem;
        }
        .upload-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .upload-area label {
            display: inline-block;
            background: #3b82f6;
            color: #fff;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-area label:hover {
            background: #2563eb;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-area .hint {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        .upload-area .hint a {
            color: #3b82f6;
            text-decoration: none;
        }
        .upload-area .hint a:hover {
            text-decoration: underline;
        }
        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            background: #fafcff;
            transition: border 0.2s, box-shadow 0.2s;
            min-height: 200px;
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }
        .sample-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.75rem 0 1.25rem 0;
        }
        .sample-btn {
            background: #eef2f6;
            border: none;
            border-radius: 30px;
            padding: 0.35rem 1.1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #1e293b;
        }
        .sample-btn:hover {
            background: #d1d9e6;
            transform: scale(1.02);
        }
        .sample-btn:active {
            transform: scale(0.96);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        #message {
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            display: none;
        }
        #message.show {
            display: block;
        }
        #message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
        }
        #message.success {
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
        }
        #message.info {
            background: #dbeafe;
            color: #1e3a8a;
            border: 1px solid #93c5fd;
        }
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .clear-storage {
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }
        #debugInfo {
            margin-top: 0.8rem;
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }
        #debugInfo.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🎵 ABC → MIDI</h1>
        <p class="sub">ABC記譜法 → MIDIファイル変換（Blob URL方式で確実読み込み）</p>

        <!-- ステータス表示 -->
        <div id="statusBox" class="loading">
            <span id="statusIcon">⏳</span>
            <span id="statusText">初期化中…</span>
        </div>

        <!-- ファイルアップロードエリア -->
        <div id="uploadArea" class="upload-area" style="display:none;">
            <p style="font-weight:600; margin-bottom:0.5rem;">📂 abcjs ライブラリをアップロードしてください</p>
            <label for="fileInput">📤 ファイルを選択 (abcjs-basic.min.js)</label>
            <input type="file" id="fileInput" accept=".js">
            <div class="hint">
                ⚡ <a href="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.1/abcjs-basic.min.js" target="_blank">ここからダウンロード</a> してアップロード（初回のみ）
            </div>
        </div>

        <!-- ABC入力 -->
        <textarea id="abcInput" spellcheck="false">X:1
T:きらきら星 (Twinkle Twinkle)
M:4/4
L:1/8
K:C
C C G G | A A G2 | F F E E | D D C2 |</textarea>

        <!-- サンプルボタン -->
        <div class="sample-area">
            <button class="sample-btn" data-sample="twinkle">✨ きらきら星</button>
            <button class="sample-btn" data-sample="scale">🎶 音階</button>
            <button class="sample-btn" data-sample="chord">🎸 コード進行</button>
            <button class="sample-btn" data-sample="minuet">🎼 メヌエット</button>
            <button class="sample-btn" data-sample="jazz">🎷 ジャズ風</button>
        </div>

        <!-- アクション -->
        <div class="actions">
            <button id="convertBtn" class="btn btn-primary" disabled>🔄 Convert to MIDI</button>
            <a id="downloadLink" class="btn btn-success" style="display:none;">⬇️ Download MIDI</a>
            <button id="clearStorageBtn" class="btn btn-danger" style="display:none;">🗑️ 保存済みライブラリを削除</button>
        </div>

        <!-- メッセージ -->
        <div id="message"></div>

        <!-- デバッグ情報 -->
        <div id="debugInfo"></div>

        <div class="footer">
            <span>💾 ライブラリはブラウザのローカルストレージに保存（初回のみアップロード）</span>
        </div>

    </div>

    <script>
        // ========================================================================
        //  1.  ローカルストレージから abcjs を読み込む（Blob URL 方式）
        // ========================================================================

        const STORAGE_KEY = 'abcjs_library_code';

        // DOM 要素
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const downloadLink = document.getElementById('downloadLink');
        const clearStorageBtn = document.getElementById('clearStorageBtn');
        const messageEl = document.getElementById('message');
        const abcInput = document.getElementById('abcInput');
        const debugEl = document.getElementById('debugInfo');

        // ----- デバッグ表示 -----
        function debugLog(msg) {
            debugEl.textContent += msg + '\n';
            debugEl.classList.add('show');
        }

        function clearDebug() {
            debugEl.textContent = '';
            debugEl.classList.remove('show');
        }

        // ----- ステータス表示 -----
        function setStatus(state, msg) {
            statusBox.className = state;
            const icons = {
                'loading': '⏳',
                'ready': '✅',
                'error': '❌',
                'warning': '⚠️'
            };
            statusIcon.textContent = icons[state] || 'ℹ️';
            statusText.textContent = msg;
        }

        // ----- メッセージ表示 -----
        function showMessage(type, text) {
            messageEl.className = 'show ' + type;
            messageEl.textContent = text;
        }

        function hideMessage() {
            messageEl.className = '';
            messageEl.textContent = '';
        }

        // ----- abcjs が使えるかチェック -----
        function isAbcjsReady() {
            return (typeof abcjs !== 'undefined' && typeof abcjs.renderMidi === 'function');
        }

        // ----- 保存済みライブラリを Blob URL で読み込む（これが確実） -----
        function loadLibraryFromStorage() {
            const code = localStorage.getItem(STORAGE_KEY);
            if (!code) {
                debugLog('❌ localStorage にコードがありません');
                return false;
            }
            debugLog('📦 localStorage からコードを取得しました（サイズ: ' + code.length + ' 文字）');

            try {
                // Blob を作成して URL 生成
                const blob = new Blob([code], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);

                debugLog('🔗 Blob URL を作成: ' + url);

                // script タグを動的に生成して読み込む
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.onload = function() {
                        debugLog('✅ script の onload が発火しました');
                        // 読み込み後、abcjs が定義されたか確認
                        setTimeout(() => {
                            if (isAbcjsReady()) {
                                debugLog('✅ abcjs がグローバルに定義されました！');
                                setStatus('ready', 'ライブラリをローカルストレージから読み込みました (abcjs v' + (abcjs
                                    .version || '') + ')');
                                convertBtn.disabled = false;
                                clearStorageBtn.style.display = 'inline-flex';
                                uploadArea.style.display = 'none';
                                hideMessage();
                                // URL を解放（メモリ）
                                setTimeout(() => URL.revokeObjectURL(url), 1000);
                                resolve(true);
                            } else {
                                debugLog('❌ script は読み込まれたが abcjs が未定義です');
                                reject(new Error('abcjs が定義されませんでした'));
                            }
                        }, 100);
                    };
                    script.onerror = function() {
                        debugLog('❌ script の読み込みに失敗しました');
                        reject(new Error('script 読み込みエラー'));
                    };
                    document.head.appendChild(script);
                }).catch(err => {
                    debugLog('❌ エラー: ' + err.message);
                    // 失敗したら保存データを削除（壊れている可能性）
                    localStorage.removeItem(STORAGE_KEY);
                    setStatus('error', 'ライブラリの読み込みに失敗しました。再度アップロードしてください。');
                    convertBtn.disabled = true;
                    clearStorageBtn.style.display = 'none';
                    uploadArea.style.display = 'block';
                    showMessage('error', '❌ 保存データが壊れています。再アップロードしてください。');
                    return false;
                });
            } catch (e) {
                debugLog('❌ 予期せぬエラー: ' + e.message);
                localStorage.removeItem(STORAGE_KEY);
                return false;
            }
        }

        // ----- ファイルをアップロードして localStorage に保存 -----
        function handleFileUpload(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const code = e.target.result;
                    debugLog('📄 ファイル読み込み完了（サイズ: ' + code.length + ' 文字）');

                    // 簡易チェック
                    if (!code.includes('abcjs')) {
                        showMessage('error', '⚠️ アップロードされたファイルは abcjs ライブラリではないようです。');
                        debugLog('❌ "abcjs" という文字列が含まれていません');
                        return;
                    }

                    // localStorage に保存
                    localStorage.setItem(STORAGE_KEY, code);
                    debugLog('💾 localStorage に保存しました');

                    // 読み込みを実行
                    loadLibraryFromStorage().then(success => {
                        if (success) {
                            showMessage('success', '✅ ライブラリを保存し、読み込みに成功しました！');
                            uploadArea.style.display = 'none';
                        } else {
                            // すでに loadLibraryFromStorage 内でエラーハンドリング済み
                        }
                    }).catch(err => {
                        showMessage('error', '❌ 読み込みに失敗しました: ' + err.message);
                    });

                } catch (err) {
                    showMessage('error', '❌ ファイル処理エラー: ' + err.message);
                    debugLog('❌ 例外: ' + err.message);
                }
            };
            reader.onerror = function() {
                showMessage('error', '❌ ファイルの読み込みに失敗しました。');
                debugLog('❌ FileReader エラー');
            };
            reader.readAsText(file);
        }

        // ----- ライブラリを削除（リセット） -----
        function clearLibrary() {
            localStorage.removeItem(STORAGE_KEY);
            setStatus('warning', 'ライブラリを削除しました。再度アップロードしてください。');
            convertBtn.disabled = true;
            downloadLink.style.display = 'none';
            clearStorageBtn.style.display = 'none';
            uploadArea.style.display = 'block';
            hideMessage();
            clearDebug();
            // abcjs を undefined に（実際には消せないが、参照を切る）
            try { delete window.abcjs; } catch (e) { window.abcjs = undefined; }
        }

        // ========================================================================
        //  2.  ページ初期化
        // ========================================================================

        async function init() {
            clearDebug();
            const hasStored = localStorage.getItem(STORAGE_KEY) !== null;
            if (hasStored) {
                setStatus('loading', '保存済みライブラリを読み込み中…');
                const success = await loadLibraryFromStorage();
                if (!success) {
                    // 失敗した場合は uploadArea を表示（loadLibraryFromStorage 内で削除済み）
                    uploadArea.style.display = 'block';
                    convertBtn.disabled = true;
                    clearStorageBtn.style.display = 'none';
                }
            } else {
                setStatus('warning', 'ライブラリがありません。下のボタンから abcjs ファイルをアップロードしてください。');
                uploadArea.style.display = 'block';
                convertBtn.disabled = true;
                clearStorageBtn.style.display = 'none';
            }
        }

        // ========================================================================
        //  3.  イベントリスナー
        // ========================================================================

        // ファイルアップロード
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                const file = this.files[0];
                if (file.name.endsWith('.js') || file.type === 'application/javascript') {
                    handleFileUpload(file);
                } else {
                    showMessage('error', '⚠️ .js ファイルを選択してください。');
                    debugLog('⚠️ 拡張子が .js ではありません: ' + file.name);
                }
                this.value = '';
            }
        });

        // ライブラリ削除
        clearStorageBtn.addEventListener('click', function() {
            if (confirm('保存されているライブラリを削除しますか？ 次回アクセス時に再アップロードが必要になります。')) {
                clearLibrary();
            }
        });

        // ========================================================================
        //  4.  サンプルデータ
        // ========================================================================

        const SAMPLES = {
            twinkle: `X:1
        T:きらきら星 (Twinkle Twinkle)
        M:4/4
        L:1/8
        K:C
        C C G G | A A G2 | F F E E | D D C2 |`,

            scale: `X:1
        T:ハ長調音階（上行・下行）
        M:4/4
        L:1/8
        K:C
        C D E F | G A B c | c B A G | F E D C |`,

            chord: `X:1
        T:コード進行 (C - G - Am - F)
        M:4/4
        L:1/4
        K:C
        "C" C2 E2 | "G" G2 B2 | "Am" A2 c2 | "F" F2 A2 |`,

            minuet: `X:1
        T:メヌエット ト長調（断片）
        M:3/4
        L:1/8
        K:G
        G2 B2 d2 | g2 d2 B2 | c2 e2 g2 | c'2 g2 e2 | d2 f2 a2 | d'2 a2 f2 |`,

            jazz: `X:1
        T:ジャズ風ブルース進行
        M:4/4
        L:1/8
        K:F
        "F7" F2 A2 c2 F2 | "Bb7" B2 d2 f2 B2 | "F7" F2 A2 c2 F2 | "C7" C2 E2 G2 C2 |`
        };

        document.querySelectorAll('.sample-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const name = this.dataset.sample;
                if (SAMPLES[name]) {
                    abcInput.value = SAMPLES[name];
                    hideMessage();
                    downloadLink.style.display = 'none';
                }
            });
        });

        // ========================================================================
        //  5.  変換処理
        // ========================================================================

        convertBtn.addEventListener('click', function() {
            if (!isAbcjsReady()) {
                showMessage('error', '❌ ライブラリが読み込まれていません。ファイルをアップロードしてください。');
                return;
            }

            const abc = abcInput.value.trim();
            hideMessage();
            downloadLink.style.display = 'none';

            if (abc === '') {
                showMessage('error', '⚠️ ABC譜が空です。楽譜を入力してください。');
                return;
            }

            try {
                const midiData = abcjs.renderMidi(abc);
                if (!midiData || midiData.length === 0) {
                    throw new Error('MIDIデータが空です。ABCの文法が正しいか確認してください。');
                }

                const blob = new Blob([midiData], { type: 'audio/midi' });
                const url = URL.createObjectURL(blob);

                downloadLink.href = url;
                downloadLink.download = 'output.mid';
                downloadLink.style.display = 'inline-flex';
                downloadLink.textContent = '⬇️ Download MIDI';

                showMessage('success', '✅ 変換成功！ ダウンロードリンクが表示されました。');

                setTimeout(function() {
                    URL.revokeObjectURL(url);
                }, 5000);

            } catch (e) {
                console.error('変換エラー:', e);
                showMessage('error', '❌ 変換エラー: ' + (e.message || '不明なエラー'));
            }
        });

        // ========================================================================
        //  6.  起動
        // ========================================================================

        init();

        console.log('✅ ABC → MIDI コンバーター (Blob URL方式) 起動');
        console.log('📌 初回は abcjs ファイルをアップロードしてください。');
        console.log('📌 アップロード後はブラウザに保存され、次回からは自動で使えます。');
        console.log('📌 デバッグ情報はページ下部に表示されます。');
    </script>

</body>
</html>
