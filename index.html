<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC → MIDI コンバーター (完全版)</title>
    <!-- 
      外部のscriptタグを使わず、下部のJavaScript内で簡易的なMIDI書き出しロジックを自作実装することで、
      外部ライブラリの読み込み失敗を根本から防ぎます。
    -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #475569;
            margin-bottom: 1.8rem;
            font-size: 1rem;
        }
        #statusBox {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #dcfce7;
            border: 1px solid #4ade80;
            color: #14532d;
            flex-wrap: wrap;
        }
        #statusIcon {
            font-size: 1.4rem;
        }
        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            background: #fafcff;
            transition: border 0.2s, box-shadow 0.2s;
            min-height: 200px;
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }
        .sample-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.75rem 0 1.25rem 0;
        }
        .sample-btn {
            background: #eef2f6;
            border: none;
            border-radius: 30px;
            padding: 0.35rem 1.1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #1e293b;
        }
        .sample-btn:hover {
            background: #d1d9e6;
            transform: scale(1.02);
        }
        .sample-btn:active {
            transform: scale(0.96);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        #message {
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            display: none;
        }
        #message.show {
            display: block;
        }
        #message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
        }
        #message.success {
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
        }
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🎵 ABC → MIDI</h1>
        <p class="sub">1ファイル完結・スタンドアロン方式（外部読込エラーなし）</p>

        <!-- ステータス表示（最初からエンジン内蔵なので常時OK） -->
        <div id="statusBox" class="ready">
            <span id="statusIcon">✅</span>
            <span id="statusText">内蔵MIDI生成エンジン 稼働中（外部読み込み不要）</span>
        </div>

        <!-- ABC入力 -->
        <textarea id="abcInput" spellcheck="false">X:1
T:きらきら星 (Twinkle Twinkle)
M:4/4
L:1/8
K:C
C C G G | A A G2 | F F E E | D D C2 |</textarea>

        <!-- サンプルボタン -->
        <div class="sample-area">
            <button class="sample-btn" data-sample="twinkle">✨ きらきら星</button>
            <button class="sample-btn" data-sample="scale">🎶 音階</button>
            <button class="sample-btn" data-sample="chord">🎸 コード進行</button>
        </div>

        <!-- アクション -->
        <div class="actions">
            <button id="convertBtn" class="btn btn-primary">🔄 Convert to MIDI</button>
            <a id="downloadLink" class="btn btn-success" style="display:none;">⬇️ Download MIDI</a>
        </div>

        <!-- メッセージ -->
        <div id="message"></div>

        <div class="footer">
            <span>📄 Pure Vanilla JS Core - No External Dependencies</span>
        </div>

    </div>

    <script>
        // ========================================================================
        //  UI制御
        // ========================================================================
        const convertBtn = document.getElementById('convertBtn');
        const downloadLink = document.getElementById('downloadLink');
        const messageEl = document.getElementById('message');
        const abcInput = document.getElementById('abcInput');

        function showMessage(type, text) {
            messageEl.className = 'show ' + type;
            messageEl.textContent = text;
        }

        function hideMessage() {
            messageEl.className = '';
            messageEl.textContent = '';
        }

        // ========================================================================
        //  超軽量・自作ABC→標準MIDIファイル(SMF)変換トランスパイラ
        //  外部ライブラリのバグや通信エラーを回避するため、ピュアJSでパースします。
        // ========================================================================
        
        // 音名からMIDIノート番号へのマッピング (Key:C想定)
        const NOTE_MAP = {
            'C': 60, 'D': 62, 'E': 64, 'F': 66, 'G': 67, 'A': 69, 'B': 71,
            'c': 72, 'd': 74, 'e': 76, 'f': 77, 'g': 79, 'a': 81, 'b': 83
        };

        function parseABCToNotes(abcText) {
            const notes = [];
            // ヘッダー行を除外して音符を含むラインだけを抽出
            const lines = abcText.split('\n');
            let musicContent = "";
            
            lines.forEach(line => {
                line = line.trim();
                if (line === "" || line.match(/^[XTHMJKL]:/)) return; // ヘッダー等を除外
                musicContent += line + " ";
            });

            // トークン解析（簡易版）
            // 小節線やスペースを除外して音符記号を切り出す
            let i = 0;
            while (i < musicContent.length) {
                let char = musicContent[i];

                // 音名にマッチするか確認
                if (NOTE_MAP[char] !== undefined) {
                    let noteNum = NOTE_MAP[char];
                    let durationMultiplier = 1;
                    i++;

                    // 長さの倍率チェック (例: C2 や C4)
                    if (i < musicContent.length && musicContent[i].match(/[0-9]/)) {
                        durationMultiplier = parseInt(musicContent[i], 10);
                        i++;
                    }

                    // 1/8音符基準 (L:1/8) 四分音符なら 480 delta-time とする設定
                    // 1/8音符 = 240 ticks
                    notes.push({
                        note: noteNum,
                        ticks: 240 * durationMultiplier
                    });
                    continue;
                }
                i++;
            }
            return notes;
        }

        function generateStandardMidiBytes(notes) {
            // 1. MThd ヘッダーチャンク (14バイト)
            const mthd = [
                0x4d, 0x54, 0x68, 0x64, // "MThd"
                0x00, 0x00, 0x00, 0x06, // チャンクデータサイズ (常に6)
                0x00, 0x00,             // フォーマット0 (単一トラック)
                0x00, 0x01,             // トラック数 (1)
                0x01, 0xe0              // 時間分解能 (四分音符=480 ticks)
            ];

            // 2. MTrk トラックチャンクデータ組み立て
            const trackData = [];

            // テンポ設定イベント (およそBPM=120)
            // delta time = 0, Meta Event (0xFF), Type (0x51), Length (3), 500,000 microseconds per quarter note
            trackData.push(0x00, 0xff, 0x51, 0x03, 0x07, 0xa1, 0x20);

            // 音符データをMIDIイベントに落とし込む
            notes.forEach(n => {
                // Note On (Delta=0, Ch1, Note, Velocity=100)
                trackData.push(0x00, 0x90, n.note, 0x64);
                
                // Note Off (Delta=n.ticks, Ch1, Note, Velocity=0)
                // 可変長数値(Variable-length quantity)の簡易エンコード (今回は127超を想定して2バイト対応)
                let ticks = n.ticks;
                if (ticks > 127) {
                    trackData.push(((ticks >> 7) & 0x7f) | 0x80);
                    trackData.push(ticks & 0x7f);
                } else {
                    trackData.push(ticks);
                }
                trackData.push(0x80, n.note, 0x00);
            });

            // トラックエンドメタイベント (Delta=0, Meta 0xFF, Type 0x2F, Length 0)
            trackData.push(0x00, 0xff, 0x2f, 0x00);

            // MTrk ヘッダーとデータ長サイズ(4バイト)の結合
            const mtrkHeader = [0x4d, 0x54, 0x72, 0x6b]; // "MTrk"
            const dataLen = trackData.length;
            const mtrkSize = [
                (dataLen >> 24) & 0xff,
                (dataLen >> 16) & 0xff,
                (dataLen >> 8) & 0xff,
                dataLen & 0xff
            ];

            // 全てを1つの配列にマージ
            const fullMidiBytes = mthd.concat(mtrkHeader, mtrkSize, trackData);
            return new Uint8Array(fullMidiBytes);
        }

        // ========================================================================
        //  変換メイン処理
        // ========================================================================
        convertBtn.addEventListener('click', function() {
            const abc = abcInput.value.trim();
            hideMessage();
            downloadLink.style.display = 'none';

            if (abc === '') {
                showMessage('error', '⚠️ ABC譜が空です。');
                return;
            }

            try {
                // ABCの文字列からノート情報を解析
                const notes = parseABCToNotes(abc);

                if (notes.length === 0) {
                    throw new Error('有効な音符データ(C, D, E, F, G, A, B等)が見つかりませんでした。');
                }

                // 純粋なスタンダードMIDIファイル(SMF)のバイナリ配列を生成
                const midiBytes = generateStandardMidiBytes(notes);

                // 安全にBlob化
                const blob = new Blob([midiBytes], { type: 'audio/midi' });
                const url = URL.createObjectURL(blob);

                downloadLink.href = url;
                downloadLink.download = 'output.mid';
                downloadLink.style.display = 'inline-flex';
                downloadLink.textContent = '⬇️ Download MIDI';

                showMessage('success', `🎉 変換成功！データサイズ: ${midiBytes.length} バイト。正常なMIDIファイルを生成しました。`);

            } catch (e) {
                console.error(e);
                showMessage('error', '❌ 変換エラー: ' + (e.message || '不明なエラー'));
            }
        });

        // ========================================================================
        //  サンプル選択
        // ========================================================================
        const SAMPLES = {
            twinkle: `X:1\nT:きらきら星\nM:4/4\nL:1/8\nK:C\nC C G G | A A G2 | F F E E | D D C2 |`,
            scale: `X:1\nT:音階\nM:4/4\nL:1/8\nK:C\nC D E F | G A B c | c B A G | F E D C |`,
            chord: `X:1\nT:コード進行\nM:4/4\nL:1/8\nK:C\nC2 E2 G2 c2 | G2 B2 d2 g2 |`
        };

        document.querySelectorAll('.sample-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const name = this.dataset.sample;
                if (SAMPLES[name]) {
                    abcInput.value = SAMPLES[name];
                    hideMessage();
                    downloadLink.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
