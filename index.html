<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC → MIDI コンバーター</title>
    <!-- ★ オンラインから自動で読み込む（ダウンロード不要） ★ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.1/abcjs-basic.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #475569;
            margin-bottom: 1.8rem;
            font-size: 1rem;
        }
        #statusBox {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        #statusBox.loading {
            background: #fef9c3;
            border-color: #facc15;
            color: #713f12;
        }
        #statusBox.ready {
            background: #dcfce7;
            border-color: #4ade80;
            color: #14532d;
        }
        #statusBox.error {
            background: #fee2e2;
            border-color: #f87171;
            color: #7f1d1d;
        }
        #statusIcon {
            font-size: 1.4rem;
        }
        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            background: #fafcff;
            transition: border 0.2s, box-shadow 0.2s;
            min-height: 200px;
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }
        .sample-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.75rem 0 1.25rem 0;
        }
        .sample-btn {
            background: #eef2f6;
            border: none;
            border-radius: 30px;
            padding: 0.35rem 1.1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #1e293b;
        }
        .sample-btn:hover {
            background: #d1d9e6;
            transform: scale(1.02);
        }
        .sample-btn:active {
            transform: scale(0.96);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        #message {
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            display: none;
        }
        #message.show {
            display: block;
        }
        #message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
        }
        #message.success {
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
        }
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🎵 ABC → MIDI</h1>
        <p class="sub">オンラインCDN方式（確実に動作）</p>

        <!-- ステータス表示 -->
        <div id="statusBox" class="loading">
            <span id="statusIcon">⏳</span>
            <span id="statusText">ライブラリを読み込み中…</span>
        </div>

        <!-- ABC入力 -->
        <textarea id="abcInput" spellcheck="false">X:1
T:きらきら星 (Twinkle Twinkle)
M:4/4
L:1/8
K:C
C C G G | A A G2 | F F E E | D D C2 |</textarea>

        <!-- サンプルボタン -->
        <div class="sample-area">
            <button class="sample-btn" data-sample="twinkle">✨ きらきら星</button>
            <button class="sample-btn" data-sample="scale">🎶 音階</button>
            <button class="sample-btn" data-sample="chord">🎸 コード進行</button>
            <button class="sample-btn" data-sample="minuet">🎼 メヌエット</button>
            <button class="sample-btn" data-sample="jazz">🎷 ジャズ風</button>
        </div>

        <!-- アクション -->
        <div class="actions">
            <button id="convertBtn" class="btn btn-primary" disabled>🔄 Convert to MIDI</button>
            <a id="downloadLink" class="btn btn-success" style="display:none;">⬇️ Download MIDI</a>
        </div>

        <!-- メッセージ -->
        <div id="message"></div>

        <div class="footer">
            <span>📄 ABCJS CDN Cloud loading</span>
        </div>

    </div>

    <script>
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const convertBtn = document.getElementById('convertBtn');
        const downloadLink = document.getElementById('downloadLink');
        const messageEl = document.getElementById('message');
        const abcInput = document.getElementById('abcInput');

        let abcjsLib = null;

        function showMessage(type, text) {
            messageEl.className = 'show ' + type;
            messageEl.textContent = text;
        }

        function hideMessage() {
            messageEl.className = '';
            messageEl.textContent = '';
        }

        function setStatus(state, msg) {
            statusBox.className = state;
            const icons = { 'loading': '⏳', 'ready': '✅', 'error': '❌' };
            statusIcon.textContent = icons[state] || 'ℹ️';
            statusText.textContent = msg;
        }

        // ライブラリ読み込み確認（★ renderMidi をチェック ★）
        function checkLibrary() {
            const lib = window.ABCJS || window.abcjs;
            if (lib && typeof lib.renderMidi === 'function') {
                abcjsLib = lib;
                setStatus('ready', '✅ abcjs ライブラリ読み込み完了！');
                convertBtn.disabled = false;
                showMessage('success', '🎉 ライブラリの読み込みに成功しました！');
                return true;
            } else {
                setStatus('error', '❌ abcjs が読み込まれていません');
                convertBtn.disabled = true;
                showMessage('error', '⚠️ abcjsライブラリが正しく読み込めませんでした。ネット接続を確認してください。');
                return false;
            }
        }

        window.addEventListener('load', function() {
            setTimeout(checkLibrary, 300);
        });

        // ========================================================================
        //  変換処理（★ renderMidi を使う ★）
        // ========================================================================
        convertBtn.addEventListener('click', function() {
            if (!abcjsLib) {
                checkLibrary();
                return;
            }

            const abc = abcInput.value.trim();
            hideMessage();
            downloadLink.style.display = 'none';

            if (abc === '') {
                showMessage('error', '⚠️ ABC譜が空です。');
                return;
            }

            try {
                // ★ renderMidi で MIDI データを生成 ★
                const midiData = abcjsLib.renderMidi(abc);
                if (!midiData || midiData.length === 0) {
                    throw new Error('MIDIデータが空です。ABC文法を確認してください。');
                }

                const blob = new Blob([midiData], { type: 'audio/midi' });
                const url = URL.createObjectURL(blob);

                downloadLink.href = url;
                downloadLink.download = 'output.mid';
                downloadLink.style.display = 'inline-flex';
                downloadLink.textContent = '⬇️ Download MIDI';

                showMessage('success', '✅ 変換成功！ ダウンロードボタンをクリックしてください。');

                setTimeout(() => URL.revokeObjectURL(url), 5000);

            } catch (e) {
                console.error(e);
                showMessage('error', '❌ 変換エラー: ' + (e.message || '不明なエラーが発生しました。'));
            }
        });

        // ========================================================================
        //  サンプルデータ
        // ========================================================================
        const SAMPLES = {
            twinkle: `X:1\nT:きらきら星\nM:4/4\nL:1/8\nK:C\nC C G G | A A G2 | F F E E | D D C2 |`,
            scale: `X:1\nT:音階\nM:4/4\nL:1/8\nK:C\nC D E F | G A B c | c B A G | F E D C |`,
            chord: `X:1\nT:コード進行\nM:4/4\nL:1/4\nK:C\n"C" C2 E2 | "G" G2 B2 | "Am" A2 c2 | "F" F2 A2 |`,
            minuet: `X:1\nT:メヌエット\nM:3/4\nL:1/8\nK:G\nG2 B2 d2 | g2 d2 B2 | c2 e2 g2 | c'2 g2 e2 |`,
            jazz: `X:1\nT:ジャズ\nM:4/4\nL:1/8\nK:F\n"F7" F2 A2 c2 F2 | "Bb7" B2 d2 f2 B2 |`
        };

        document.querySelectorAll('.sample-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const name = this.dataset.sample;
                if (SAMPLES[name]) {
                    abcInput.value = SAMPLES[name];
                    hideMessage();
                    downloadLink.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>
