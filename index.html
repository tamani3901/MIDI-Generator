<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC → MIDI（3WAYフェイルセーフ版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #475569;
            margin-bottom: 1.8rem;
            font-size: 1rem;
        }
        #statusBox {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        #statusBox .badge {
            font-size: 0.75rem;
            background: #e2e8f0;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            color: #334155;
        }
        #statusBox.loading {
            background: #fef9c3;
            border-color: #facc15;
            color: #713f12;
        }
        #statusBox.ready {
            background: #dcfce7;
            border-color: #4ade80;
            color: #14532d;
        }
        #statusBox.error {
            background: #fee2e2;
            border-color: #f87171;
            color: #7f1d1d;
        }
        #statusBox.warning {
            background: #ffedd5;
            border-color: #fb923c;
            color: #7c2d12;
        }
        #statusIcon {
            font-size: 1.4rem;
        }
        .upload-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .upload-area label {
            display: inline-block;
            background: #3b82f6;
            color: #fff;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-area label:hover {
            background: #2563eb;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-area .hint {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }
        .upload-area .hint a {
            color: #3b82f6;
            text-decoration: none;
        }
        .upload-area .hint a:hover {
            text-decoration: underline;
        }
        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            background: #fafcff;
            transition: border 0.2s, box-shadow 0.2s;
            min-height: 200px;
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }
        .sample-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.75rem 0 1.25rem 0;
        }
        .sample-btn {
            background: #eef2f6;
            border: none;
            border-radius: 30px;
            padding: 0.35rem 1.1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #1e293b;
        }
        .sample-btn:hover {
            background: #d1d9e6;
            transform: scale(1.02);
        }
        .sample-btn:active {
            transform: scale(0.96);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        #message {
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            display: none;
        }
        #message.show {
            display: block;
        }
        #message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
        }
        #message.success {
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
        }
        #message.info {
            background: #dbeafe;
            color: #1e3a8a;
            border: 1px solid #93c5fd;
        }
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        #debugInfo {
            margin-top: 0.8rem;
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }
        #debugInfo.show {
            display: block;
        }
        .method-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: #3b82f6;
            color: #fff;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            margin-left: 0.3rem;
        }
        .method-badge.success {
            background: #22c55e;
        }
        .method-badge.fail {
            background: #ef4444;
        }
        .method-badge.trying {
            background: #facc15;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🎵 ABC → MIDI</h1>
        <p class="sub">3つの読み込み方式で確実に動作（自動・アップロード・GitHub同梱）</p>

        <!-- ステータス表示 -->
        <div id="statusBox" class="loading">
            <span id="statusIcon">⏳</span>
            <span id="statusText">初期化中…</span>
            <span id="methodInfo" class="badge">方式: -</span>
        </div>

        <!-- ファイルアップロードエリア（方式2用） -->
        <div id="uploadArea" class="upload-area" style="display:none;">
            <p style="font-weight:600; margin-bottom:0.5rem;">📂 自分でアップロード（方式2）</p>
            <label for="fileInput">📤 abcjs-basic.min.js を選択</label>
            <input type="file" id="fileInput" accept=".js">
            <div class="hint">
                ⚡ <a href="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.1/abcjs-basic.min.js" target="_blank">ダウンロードはこちら</a>
            </div>
        </div>

        <!-- ABC入力 -->
        <textarea id="abcInput" spellcheck="false">X:1
T:きらきら星 (Twinkle Twinkle)
M:4/4
L:1/8
K:C
C C G G | A A G2 | F F E E | D D C2 |</textarea>

        <!-- サンプルボタン -->
        <div class="sample-area">
            <button class="sample-btn" data-sample="twinkle">✨ きらきら星</button>
            <button class="sample-btn" data-sample="scale">🎶 音階</button>
            <button class="sample-btn" data-sample="chord">🎸 コード進行</button>
            <button class="sample-btn" data-sample="minuet">🎼 メヌエット</button>
            <button class="sample-btn" data-sample="jazz">🎷 ジャズ風</button>
        </div>

        <!-- アクション -->
        <div class="actions">
            <button id="convertBtn" class="btn btn-primary" disabled>🔄 Convert to MIDI</button>
            <a id="downloadLink" class="btn btn-success" style="display:none;">⬇️ Download MIDI</a>
            <button id="clearStorageBtn" class="btn btn-danger" style="display:none;">🗑️ 保存済みを削除</button>
            <button id="retryBtn" class="btn btn-primary" style="background:#6b7280;display:none;">🔄 再試行</button>
        </div>

        <!-- メッセージ -->
        <div id="message"></div>

        <!-- デバッグ情報 -->
        <div id="debugInfo"></div>

        <div class="footer">
            <span>🔹 方式1: GitHub同梱 → 方式2: アップロード保存 → 方式3: CDN自動読み込み</span>
        </div>

    </div>

    <script>
        // ========================================================================
        //  設定
        // ========================================================================

        const STORAGE_KEY = 'abcjs_library_code';
        const CDN_URLS = [
            'https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.1/abcjs-basic.min.js',
            'https://cdn.jsdelivr.net/npm/abcjs@6.4.1/dist/abcjs-basic-min.js',
            'https://unpkg.com/abcjs@6.4.1/dist/abcjs-basic-min.js'
        ];
        const LOCAL_FILE = 'abcjs-basic.min.js'; // 同じディレクトリのファイル

        // DOM
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const methodInfo = document.getElementById('methodInfo');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const downloadLink = document.getElementById('downloadLink');
        const clearStorageBtn = document.getElementById('clearStorageBtn');
        const retryBtn = document.getElementById('retryBtn');
        const messageEl = document.getElementById('message');
        const abcInput = document.getElementById('abcInput');
        const debugEl = document.getElementById('debugInfo');

        let libraryLoaded = false;
        let loadMethod = '';

        // ----- デバッグ -----
        function debugLog(msg) {
            debugEl.textContent += msg + '\n';
            debugEl.classList.add('show');
        }

        function clearDebug() {
            debugEl.textContent = '';
            debugEl.classList.remove('show');
        }

        // ----- ステータス -----
        function setStatus(state, msg, method) {
            statusBox.className = state;
            const icons = {
                'loading': '⏳',
                'ready': '✅',
                'error': '❌',
                'warning': '⚠️'
            };
            statusIcon.textContent = icons[state] || 'ℹ️';
            statusText.textContent = msg;
            if (method) {
                methodInfo.textContent = '方式: ' + method;
                methodInfo.style.display = 'inline';
            } else {
                methodInfo.style.display = 'none';
            }
        }

        // ----- メッセージ -----
        function showMessage(type, text) {
            messageEl.className = 'show ' + type;
            messageEl.textContent = text;
        }

        function hideMessage() {
            messageEl.className = '';
            messageEl.textContent = '';
        }

        // ----- abcjs チェック -----
        function isAbcjsReady() {
            return (typeof abcjs !== 'undefined' && typeof abcjs.renderMidi === 'function');
        }

        // ========================================================================
        //  方式1: GitHub同梱ファイルを読み込む（<script src> で読み込み）
        // ========================================================================

        function tryLoadLocalFile() {
            return new Promise((resolve) => {
                debugLog('📁 方式1: GitHub同梱ファイルを試行中... (' + LOCAL_FILE + ')');
                setStatus('loading', '方式1: 同梱ファイルを読み込み中…', '1/3 同梱');

                // 既に読み込まれているかチェック
                if (isAbcjsReady()) {
                    debugLog('✅ 方式1: 既に abcjs が定義されています');
                    libraryLoaded = true;
                    loadMethod = '同梱ファイル（既存）';
                    setStatus('ready', 'ライブラリ読み込み完了（同梱ファイル）', '1/3 同梱 ✅');
                    resolve(true);
                    return;
                }

                // script タグで読み込み
                const script = document.createElement('script');
                script.src = LOCAL_FILE;
                script.async = false; // 順次実行

                let resolved = false;

                script.onload = function() {
                    if (resolved) return;
                    resolved = true;
                    debugLog('✅ 方式1: script.onload 発火');
                    setTimeout(() => {
                        if (isAbcjsReady()) {
                            libraryLoaded = true;
                            loadMethod = '同梱ファイル';
                            setStatus('ready', 'ライブラリ読み込み完了（同梱ファイル）', '1/3 同梱 ✅');
                            resolve(true);
                        } else {
                            debugLog('⚠️ 方式1: onload したが abcjs が未定義');
                            resolve(false);
                        }
                    }, 200);
                };

                script.onerror = function() {
                    if (resolved) return;
                    resolved = true;
                    debugLog('❌ 方式1: ファイルが見つからないか読み込みエラー');
                    resolve(false);
                };

                document.head.appendChild(script);

                // タイムアウト（5秒）
                setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        debugLog('⏰ 方式1: タイムアウト');
                        resolve(false);
                    }
                }, 5000);
            });
        }

        // ========================================================================
        //  方式2: localStorage に保存されたコードを実行（textContent 埋め込み）
        // ========================================================================

        function tryLoadFromStorage() {
            return new Promise((resolve) => {
                const code = localStorage.getItem(STORAGE_KEY);
                if (!code) {
                    debugLog('❌ 方式2: localStorage にコードがありません');
                    resolve(false);
                    return;
                }
                debugLog('📦 方式2: localStorage からコードを取得（サイズ: ' + code.length + ' 文字）');
                setStatus('loading', '方式2: 保存済みコードを読み込み中…', '2/3 保存');

                try {
                    // textContent 埋め込み
                    const script = document.createElement('script');
                    script.textContent = code;
                    document.head.appendChild(script);
                    debugLog('✅ 方式2: script.textContent で埋め込み実行');

                    // 即座にチェック
                    if (isAbcjsReady()) {
                        libraryLoaded = true;
                        loadMethod = 'アップロード保存 (localStorage)';
                        setStatus('ready', 'ライブラリ読み込み完了（保存済み）', '2/3 保存 ✅');
                        resolve(true);
                        return;
                    }

                    // 少し待って再チェック
                    setTimeout(() => {
                        if (isAbcjsReady()) {
                            libraryLoaded = true;
                            loadMethod = 'アップロード保存 (localStorage)';
                            setStatus('ready', 'ライブラリ読み込み完了（保存済み）', '2/3 保存 ✅');
                            resolve(true);
                        } else {
                            debugLog('❌ 方式2: 実行後も abcjs が未定義');
                            // 壊れている可能性があるので削除
                            localStorage.removeItem(STORAGE_KEY);
                            resolve(false);
                        }
                    }, 300);

                } catch (e) {
                    debugLog('❌ 方式2: エラー - ' + e.message);
                    localStorage.removeItem(STORAGE_KEY);
                    resolve(false);
                }
            });
        }

        // ========================================================================
        //  方式3: CDNから自動読み込み（複数CDNをフォールバック）
        // ========================================================================

        function tryLoadCDN() {
            return new Promise((resolve) => {
                let cdnIndex = 0;

                function loadNextCDN() {
                    if (cdnIndex >= CDN_URLS.length) {
                        debugLog('❌ 方式3: 全てのCDNが失敗しました');
                        resolve(false);
                        return;
                    }

                    const url = CDN_URLS[cdnIndex];
                    cdnIndex++;
                    debugLog('🌐 方式3: CDN ' + cdnIndex + '/' + CDN_URLS.length + ' を試行: ' + url);
                    setStatus('loading', '方式3: CDNから読み込み中 (' + cdnIndex + '/' + CDN_URLS.length + ')', '3/3 CDN');

                    const script = document.createElement('script');
                    script.src = url;
                    script.async = false;

                    let resolved = false;

                    script.onload = function() {
                        if (resolved) return;
                        resolved = true;
                        debugLog('✅ 方式3: script.onload 発火');
                        setTimeout(() => {
                            if (isAbcjsReady()) {
                                libraryLoaded = true;
                                loadMethod = 'CDN (' + url + ')';
                                setStatus('ready', 'ライブラリ読み込み完了（CDN）', '3/3 CDN ✅');
                                resolve(true);
                            } else {
                                debugLog('⚠️ 方式3: onload したが abcjs が未定義 → 次のCDNへ');
                                loadNextCDN();
                            }
                        }, 300);
                    };

                    script.onerror = function() {
                        if (resolved) return;
                        resolved = true;
                        debugLog('❌ 方式3: CDN読み込みエラー → 次のCDNへ');
                        loadNextCDN();
                    };

                    document.head.appendChild(script);

                    // タイムアウト（8秒）
                    setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            debugLog('⏰ 方式3: タイムアウト → 次のCDNへ');
                            loadNextCDN();
                        }
                    }, 8000);
                }

                loadNextCDN();
            });
        }

        // ========================================================================
        //  メイン初期化：3方式を順番に試行
        // ========================================================================

        async function initLibrary() {
            clearDebug();
            hideMessage();
            convertBtn.disabled = true;
            downloadLink.style.display = 'none';
            clearStorageBtn.style.display = 'none';
            retryBtn.style.display = 'none';
            uploadArea.style.display = 'none';

            // 既に abcjs が定義されている場合（稀）
            if (isAbcjsReady()) {
                libraryLoaded = true;
                loadMethod = '既存（再読み込み）';
                setStatus('ready', 'ライブラリは既に読み込まれています', '既存 ✅');
                convertBtn.disabled = false;
                clearStorageBtn.style.display = localStorage.getItem(STORAGE_KEY) ? 'inline-flex' : 'none';
                return;
            }

            // ---- 方式1: 同梱ファイル ----
            const ok1 = await tryLoadLocalFile();
            if (ok1) {
                convertBtn.disabled = false;
                clearStorageBtn.style.display = localStorage.getItem(STORAGE_KEY) ? 'inline-flex' : 'none';
                return;
            }

            // ---- 方式2: localStorage ----
            const ok2 = await tryLoadFromStorage();
            if (ok2) {
                convertBtn.disabled = false;
                clearStorageBtn.style.display = 'inline-flex';
                return;
            }

            // ---- 方式3: CDN ----
            const ok3 = await tryLoadCDN();
            if (ok3) {
                convertBtn.disabled = false;
                clearStorageBtn.style.display = localStorage.getItem(STORAGE_KEY) ? 'inline-flex' : 'none';
                return;
            }

            // ---- 全て失敗 ----
            setStatus('error', '全ての読み込み方式が失敗しました。ファイルをアップロードしてください。', '❌ 全滅');
            uploadArea.style.display = 'block';
            convertBtn.disabled = true;
            retryBtn.style.display = 'inline-flex';
            showMessage('error', '❌ ライブラリを読み込めませんでした。下の「ファイルを選択」から abcjs をアップロードするか、ページを再読み込みして再試行してください。');
        }

        // ========================================================================
        //  ファイルアップロード（方式2 手動）
        // ========================================================================

        function handleFileUpload(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const code = e.target.result;
                    debugLog('📄 アップロードファイル読み込み（サイズ: ' + code.length + ' 文字）');

                    if (!code.includes('abcjs')) {
                        showMessage('error', '⚠️ abcjs ライブラリではないようです。');
                        return;
                    }

                    localStorage.setItem(STORAGE_KEY, code);
                    debugLog('💾 localStorage に保存しました');

                    // すぐに読み込みを試行
                    const script = document.createElement('script');
                    script.textContent = code;
                    document.head.appendChild(script);

                    setTimeout(() => {
                        if (isAbcjsReady()) {
                            libraryLoaded = true;
                            loadMethod = 'アップロード（手動）';
                            setStatus('ready', 'ライブラリ読み込み完了（アップロード）', 'アップロード ✅');
                            convertBtn.disabled = false;
                            clearStorageBtn.style.display = 'inline-flex';
                            uploadArea.style.display = 'none';
                            showMessage('success', '✅ アップロード成功！ 変換が使えます。');
                            hideMessage();
                        } else {
                            showMessage('error', '❌ アップロード後も abcjs が定義されません。ファイルが壊れている可能性があります。');
                        }
                    }, 300);

                } catch (err) {
                    showMessage('error', '❌ ファイル処理エラー: ' + err.message);
                }
            };
            reader.onerror = function() {
                showMessage('error', '❌ ファイル読み込みエラー');
            };
            reader.readAsText(file);
        }

        // ========================================================================
        //  イベントリスナー
        // ========================================================================

        // ファイル選択
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                handleFileUpload(this.files[0]);
                this.value = '';
            }
        });

        // 保存済み削除
        clearStorageBtn.addEventListener('click', function() {
            if (confirm('保存されているライブラリを削除しますか？')) {
                localStorage.removeItem(STORAGE_KEY);
                clearStorageBtn.style.display = 'none';
                setStatus('warning', '保存済みライブラリを削除しました', '削除');
                // abcjs はそのまま残るが、削除ボタンは消す
                showMessage('info', '🗑️ 保存データを削除しました。次回アクセス時は再アップロードが必要です。');
            }
        });

        // 再試行
        retryBtn.addEventListener('click', function() {
            retryBtn.style.display = 'none';
            initLibrary();
        });

        // 変換
        convertBtn.addEventListener('click', function() {
            if (!isAbcjsReady()) {
                showMessage('error', '❌ ライブラリが読み込まれていません。');
                return;
            }

            const abc = abcInput.value.trim();
            hideMessage();
            downloadLink.style.display = 'none';

            if (abc === '') {
                showMessage('error', '⚠️ ABC譜が空です。');
                return;
            }

            try {
                const midiData = abcjs.renderMidi(abc);
                if (!midiData || midiData.length === 0) {
                    throw new Error('MIDIデータが空です。文法を確認してください。');
                }

                const blob = new Blob([midiData], { type: 'audio/midi' });
                const url = URL.createObjectURL(blob);

                downloadLink.href = url;
                downloadLink.download = 'output.mid';
                downloadLink.style.display = 'inline-flex';
                downloadLink.textContent = '⬇️ Download MIDI';

                showMessage('success', '✅ 変換成功！ ダウンロードリンクが表示されました。');

                setTimeout(() => URL.revokeObjectURL(url), 5000);

            } catch (e) {
                console.error(e);
                showMessage('error', '❌ 変換エラー: ' + (e.message || '不明'));
            }
        });

        // ========================================================================
        //  サンプル
        // ========================================================================

        const SAMPLES = {
            twinkle: `X:1\nT:きらきら星\nM:4/4\nL:1/8\nK:C\nC C G G | A A G2 | F F E E | D D C2 |`,
            scale: `X:1\nT:音階\nM:4/4\nL:1/8\nK:C\nC D E F | G A B c | c B A G | F E D C |`,
            chord: `X:1\nT:コード進行\nM:4/4\nL:1/4\nK:C\n"C" C2 E2 | "G" G2 B2 | "Am" A2 c2 | "F" F2 A2 |`,
            minuet: `X:1\nT:メヌエット\nM:3/4\nL:1/8\nK:G\nG2 B2 d2 | g2 d2 B2 | c2 e2 g2 | c'2 g2 e2 |`,
            jazz: `X:1\nT:ジャズ\nM:4/4\nL:1/8\nK:F\n"F7" F2 A2 c2 F2 | "Bb7" B2 d2 f2 B2 |`
        };

        document.querySelectorAll('.sample-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const name = this.dataset.sample;
                if (SAMPLES[name]) {
                    abcInput.value = SAMPLES[name];
                    hideMessage();
                    downloadLink.style.display = 'none';
                }
            });
        });

        // ========================================================================
        //  起動
        // ========================================================================

        initLibrary();
        console.log('✅ 3WAYフェイルセーフ版 起動');
        console.log('📌 方式1: 同梱ファイル → 方式2: localStorage → 方式3: CDN');
    </script>

</body>
</html>
