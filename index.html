<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC → MIDI 変換（完全版・複数CDNフォールバック）</title>
    <style>
        /* ---------- リセット & ベース ---------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 880px;
            width: 100%;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }
        .sub {
            color: #475569;
            margin-bottom: 1.8rem;
            font-size: 1rem;
        }

        /* ---------- ステータス ---------- */
        #statusBox {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f1f5f9;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        #statusBox.loading {
            background: #fef9c3;
            border-color: #facc15;
            color: #713f12;
        }
        #statusBox.ready {
            background: #dcfce7;
            border-color: #4ade80;
            color: #14532d;
        }
        #statusBox.error {
            background: #fee2e2;
            border-color: #f87171;
            color: #7f1d1d;
        }
        #statusIcon {
            font-size: 1.4rem;
        }

        /* ---------- テキストエリア ---------- */
        textarea {
            width: 100%;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            background: #fafcff;
            transition: border 0.2s, box-shadow 0.2s;
            min-height: 200px;
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        /* ---------- サンプルボタン ---------- */
        .sample-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.75rem 0 1.25rem 0;
        }
        .sample-btn {
            background: #eef2f6;
            border: none;
            border-radius: 30px;
            padding: 0.35rem 1.1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            color: #1e293b;
        }
        .sample-btn:hover {
            background: #d1d9e6;
            transform: scale(1.02);
        }
        .sample-btn:active {
            transform: scale(0.96);
        }

        /* ---------- アクション ---------- */
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0 0.8rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, opacity 0.2s;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            background: #2563eb;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
        }
        .btn-success:hover {
            background: #16a34a;
        }

        /* ---------- メッセージ ---------- */
        #message {
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            display: none;
        }
        #message.show {
            display: block;
        }
        #message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
        }
        #message.success {
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
        }
        #message.info {
            background: #dbeafe;
            color: #1e3a8a;
            border: 1px solid #93c5fd;
        }

        /* ---------- フッター ---------- */
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* ---------- レスポンシブ ---------- */
        @media (max-width: 600px) {
            .container {
                padding: 1.2rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .btn {
                padding: 0.6rem 1.4rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🎵 ABC → MIDI</h1>
        <p class="sub">ABC記譜法で書かれた楽譜を MIDI ファイル (.mid) に変換します。</p>

        <!-- ライブラリ状態 -->
        <div id="statusBox" class="loading">
            <span id="statusIcon">⏳</span>
            <span id="statusText">ライブラリを読み込み中…</span>
        </div>

        <!-- 入力 -->
        <textarea id="abcInput" spellcheck="false">X:1
T:きらきら星 (Twinkle Twinkle Little Star)
M:4/4
L:1/8
K:C
C C G G | A A G2 | F F E E | D D C2 |</textarea>

        <!-- サンプル -->
        <div class="sample-area">
            <button class="sample-btn" data-sample="twinkle">✨ きらきら星</button>
            <button class="sample-btn" data-sample="scale">🎶 音階</button>
            <button class="sample-btn" data-sample="chord">🎸 コード進行</button>
            <button class="sample-btn" data-sample="minuet">🎼 メヌエット</button>
            <button class="sample-btn" data-sample="jazz">🎷 ジャズ風</button>
        </div>

        <!-- アクション -->
        <div class="actions">
            <button id="convertBtn" class="btn btn-primary" disabled>🔄 Convert to MIDI</button>
            <a id="downloadLink" class="btn btn-success" style="display:none;">⬇️ Download MIDI</a>
        </div>

        <!-- 結果メッセージ -->
        <div id="message"></div>

        <div class="footer">
            <span>⚡ 複数のCDNからライブラリを自動読み込み（フォールバック対応） • </span>
            <span>GitHub Pages で動作確認済み</span>
        </div>

    </div>

    <script>
        // ========================================================================
        //  1.  abcjs ライブラリを 複数のCDN から動的に読み込む（フォールバック）
        // ========================================================================

        // 読み込み元リスト（優先順位順）
        const CDN_LIST = [
            'https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.1/abcjs-basic.min.js',
            'https://cdn.jsdelivr.net/npm/abcjs@6.4.1/dist/abcjs-basic-min.js',
            'https://unpkg.com/abcjs@6.4.1/dist/abcjs-basic-min.js'
        ];

        let cdnIndex = 0; // 現在試行中のCDNインデックス
        let libReady = false; // ライブラリがロード済みか

        // DOM 要素
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const convertBtn = document.getElementById('convertBtn');
        const downloadLink = document.getElementById('downloadLink');
        const messageEl = document.getElementById('message');
        const abcInput = document.getElementById('abcInput');

        // ----- ステータス表示を更新 -----
        function setStatus(state, msg) {
            statusBox.className = state; // 'loading' / 'ready' / 'error'
            if (state === 'loading') {
                statusIcon.textContent = '⏳';
            } else if (state === 'ready') {
                statusIcon.textContent = '✅';
            } else if (state === 'error') {
                statusIcon.textContent = '❌';
            }
            statusText.textContent = msg;
        }

        // ----- メッセージ表示 -----
        function showMessage(type, text) {
            messageEl.className = 'show ' + type;
            messageEl.textContent = text;
        }

        function hideMessage() {
            messageEl.className = '';
            messageEl.textContent = '';
        }

        // ----- abcjs が使えるかチェック -----
        function isAbcjsReady() {
            return (typeof abcjs !== 'undefined' && typeof abcjs.renderMidi === 'function');
        }

        // ----- ライブラリ読み込み成功時の処理 -----
        function onLibraryLoaded() {
            libReady = true;
            setStatus('ready', 'ライブラリ読み込み完了 (abcjs v' + (abcjs.version || '') + ')');
            convertBtn.disabled = false;
            hideMessage();
            // ダウンロードリンクは一旦非表示
            downloadLink.style.display = 'none';
        }

        // ----- ライブラリ読み込み失敗時の処理（次のCDNを試す） -----
        function onLibraryError() {
            cdnIndex++;
            if (cdnIndex < CDN_LIST.length) {
                // 次のCDNを試す
                const nextSrc = CDN_LIST[cdnIndex];
                setStatus('loading', 'CDN ' + (cdnIndex + 1) + '/' + CDN_LIST.length + ' を試行中: ' + nextSrc);
                loadScript(nextSrc, onLibraryLoaded, onLibraryError);
            } else {
                // すべてのCDNが失敗
                setStatus('error', 'すべてのCDNからライブラリを読み込めませんでした。ネットワーク接続を確認し、ページを再読み込みしてください。');
                convertBtn.disabled = true;
                showMessage('error', '⚠️ ライブラリの読み込みに失敗しました。インターネット接続を確認するか、ブラウザの拡張機能を一時無効にして再読み込みしてください。');
            }
        }

        // ----- スクリプトを動的にロード -----
        function loadScript(src, onSuccess, onError) {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            script.onload = function() {
                // ロード後、実際に abcjs が定義されているか確認
                if (isAbcjsReady()) {
                    onSuccess();
                } else {
                    // ロードは成功したが abcjs がまだ未定義の場合（まれ）
                    // 少し待ってから再チェック
                    setTimeout(function() {
                        if (isAbcjsReady()) {
                            onSuccess();
                        } else {
                            onError();
                        }
                    }, 300);
                }
            };
            script.onerror = function() {
                onError();
            };
            document.head.appendChild(script);
        }

        // ----- ライブラリ読み込みを開始 -----
        function startLibraryLoad() {
            const firstSrc = CDN_LIST[0];
            setStatus('loading', 'CDN 1/' + CDN_LIST.length + ' を読み込み中: ' + firstSrc);
            loadScript(firstSrc, onLibraryLoaded, onLibraryError);
        }

        // ページ読み込み後に開始
        window.addEventListener('load', function() {
            // すでにグローバルに abcjs が存在する場合（例：直接scriptタグで読み込んだ場合）
            if (isAbcjsReady()) {
                onLibraryLoaded();
                return;
            }
            // 存在しない場合は動的ロード開始
            startLibraryLoad();
        });

        // 手動再試行用（デバッグ時に console から呼べる）
        window.retryLoad = function() {
            cdnIndex = 0;
            hideMessage();
            downloadLink.style.display = 'none';
            convertBtn.disabled = true;
            startLibraryLoad();
        };

        // ========================================================================
        //  2.  サンプルデータ
        // ========================================================================

        const SAMPLES = {
            twinkle: `X:1
        T:きらきら星 (Twinkle Twinkle)
        M:4/4
        L:1/8
        K:C
        C C G G | A A G2 | F F E E | D D C2 |`,

            scale: `X:1
        T:ハ長調音階（上行・下行）
        M:4/4
        L:1/8
        K:C
        C D E F | G A B c | c B A G | F E D C |`,

            chord: `X:1
        T:コード進行 (C - G - Am - F)
        M:4/4
        L:1/4
        K:C
        "C" C2 E2 | "G" G2 B2 | "Am" A2 c2 | "F" F2 A2 |`,

            minuet: `X:1
        T:メヌエット ト長調（断片）
        M:3/4
        L:1/8
        K:G
        G2 B2 d2 | g2 d2 B2 | c2 e2 g2 | c'2 g2 e2 | d2 f2 a2 | d'2 a2 f2 |`,

            jazz: `X:1
        T:ジャズ風ブルース進行
        M:4/4
        L:1/8
        K:F
        "F7" F2 A2 c2 F2 | "Bb7" B2 d2 f2 B2 | "F7" F2 A2 c2 F2 | "C7" C2 E2 G2 C2 |`
        };

        // サンプルボタンにイベントを設定
        document.querySelectorAll('.sample-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const name = this.dataset.sample;
                if (SAMPLES[name]) {
                    abcInput.value = SAMPLES[name];
                    hideMessage();
                    downloadLink.style.display = 'none';
                }
            });
        });

        // ========================================================================
        //  3.  変換処理
        // ========================================================================

        convertBtn.addEventListener('click', function() {
            // ライブラリが使えるか再確認
            if (!isAbcjsReady()) {
                showMessage('error', '❌ ライブラリがまだ読み込まれていません。ページを再読み込みするか、コンソールで retryLoad() を実行してください。');
                return;
            }

            const abc = abcInput.value.trim();
            hideMessage();
            downloadLink.style.display = 'none';

            if (abc === '') {
                showMessage('error', '⚠️ ABC譜が空です。楽譜を入力してください。');
                return;
            }

            try {
                // MIDIデータを生成 (renderMidi は Uint8Array を返す)
                const midiData = abcjs.renderMidi(abc);

                if (!midiData || midiData.length === 0) {
                    throw new Error('MIDIデータが空です。ABCの文法が正しいか確認してください。');
                }

                // Blob を作成
                const blob = new Blob([midiData], { type: 'audio/midi' });
                const url = URL.createObjectURL(blob);

                // ダウンロードリンクを設定
                downloadLink.href = url;
                downloadLink.download = 'output.mid';
                downloadLink.style.display = 'inline-flex';
                downloadLink.textContent = '⬇️ Download MIDI';

                showMessage('success', '✅ 変換成功！ ダウンロードリンクが表示されました。クリックしてMIDIファイルを保存してください。');

                // メモリ解放（5秒後）
                setTimeout(function() {
                    URL.revokeObjectURL(url);
                }, 5000);

            } catch (e) {
                console.error('変換エラー詳細:', e);
                showMessage('error', '❌ 変換エラー: ' + (e.message || '不明なエラーが発生しました。'));
            }
        });

        // ダウンロードリンクをクリックしたらメッセージをクリアしても良い（オプション）
        downloadLink.addEventListener('click', function() {
            // 何もしないが、リンクは機能する
        });

        // ========================================================================
        //  4.  初期状態でサンプルをロード（デフォルトはきらきら星）
        // ========================================================================

        // すでに textarea にデフォルト値が入っているので、あえて何もしない
        // ただし、サンプルボタンで切り替えられるようにしておく

        console.log('✅ ABC → MIDI コンバーターが起動しました。');
        console.log('📌 ライブラリが読み込まれない場合は、コンソールで retryLoad() を実行してください。');
    </script>

</body>
</html>
